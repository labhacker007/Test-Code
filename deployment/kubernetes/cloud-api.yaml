apiVersion: v1
kind: Namespace
metadata:
  name: runtime-ai-security
---
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: runtime-ai-security
type: Opaque
stringData:
  DATABASE_URL: "postgres://user:password@postgres-service:5432/runtime_ai_security?sslmode=require"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-api-config
  namespace: runtime-ai-security
data:
  LISTEN_ADDR: ":8080"
  LOG_LEVEL: "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-api
  namespace: runtime-ai-security
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloud-api
  template:
    metadata:
      labels:
        app: cloud-api
    spec:
      containers:
      - name: api
        image: your-registry/cloud-api:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: DATABASE_URL
        envFrom:
        - configMapRef:
            name: cloud-api-config
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-api
  namespace: runtime-ai-security
spec:
  selector:
    app: cloud-api
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-api-ingress
  namespace: runtime-ai-security
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - api.runtime-ai-security.example.com
    secretName: cloud-api-tls
  rules:
  - host: api.runtime-ai-security.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cloud-api
            port:
              number: 80
